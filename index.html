<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GPC — Divisão de Atividades</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#2B4A7A;--navy2:#1F3A6B;--navy3:#3D5F95;
  --orange:#F5831F;
  --off:#F4F7FC;--gray1:#EEF2F8;--gray2:#D0DAE8;--gray3:#8FA3BE;
  --dark:#1A2D4F;--text:#1A2E4A;--muted:#5A7090;
  --green:#1E7B4B;--green2:#D4EDDF;
  --danger:#C0392B;--danger2:#FDECEA;
  --amber:#854F0B;--amber2:#FEF3E2;
  --radius:12px;--radius-sm:8px;
  --shadow:0 2px 12px rgba(15,30,60,0.08);
  --shadow-md:0 4px 24px rgba(15,30,60,0.12);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sora',sans-serif;background:var(--off);color:var(--text);min-height:100vh;font-size:14px;overflow-x:hidden}

/* ════ SIDEBAR ════ */
.sidebar{position:fixed;top:0;left:0;width:230px;height:100vh;background:var(--dark);display:flex;flex-direction:column;z-index:100;border-right:1px solid rgba(255,255,255,0.06);overflow-y:auto}
.sidebar-logo{padding:22px 20px 16px;border-bottom:1px solid rgba(255,255,255,0.08);flex-shrink:0}
.logo-text{font-size:18px;font-weight:700;color:#fff;letter-spacing:-.5px}
.logo-text span{color:var(--orange)}
.sidebar-tag{font-size:9px;font-weight:600;letter-spacing:.12em;color:var(--orange);text-transform:uppercase;margin-top:5px}
.sidebar-section{font-size:9px;font-weight:600;letter-spacing:.1em;color:rgba(255,255,255,0.28);text-transform:uppercase;padding:16px 20px 6px;flex-shrink:0}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 20px;color:rgba(255,255,255,0.55);cursor:pointer;font-size:12.5px;border-left:2px solid transparent;transition:all .15s;user-select:none;flex-shrink:0}
.nav-item:hover{color:#fff;background:rgba(255,255,255,0.05)}
.nav-item.active{color:#fff;font-weight:600;border-left-color:var(--orange);background:rgba(245,131,31,0.1)}
.nav-icon{font-size:14px;width:18px;text-align:center;flex-shrink:0}
.nav-badge{background:var(--danger);color:#fff;font-size:9px;font-weight:700;padding:1px 6px;border-radius:8px;font-family:'JetBrains Mono',monospace;margin-left:auto}
.sidebar-spacer{flex:1}
.sidebar-footer{padding:14px 20px;border-top:1px solid rgba(255,255,255,0.06);font-size:10px;color:rgba(255,255,255,0.25);line-height:1.7;flex-shrink:0}

/* ════ MAIN ════ */
.main{margin-left:230px;min-height:100vh;overflow-x:hidden}
.topbar{background:#fff;border-bottom:1px solid var(--gray2);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.topbar-title{font-size:14px;font-weight:600;color:var(--navy);display:flex;align-items:center;gap:10px}
.topbar-right{display:flex;align-items:center;gap:10px}
.dot-live{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;display:inline-block}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.btn-top{height:32px;padding:0 14px;border:1px solid var(--gray2);border-radius:20px;background:#fff;color:var(--navy);font-size:11px;font-weight:600;cursor:pointer;font-family:'Sora',sans-serif;transition:all .15s;display:flex;align-items:center;gap:6px}
.btn-top:hover{background:var(--gray1);border-color:var(--navy)}
.btn-top.orange{background:var(--orange);color:#fff;border-color:var(--orange)}
.btn-top.orange:hover{opacity:.9}
.btn-top.danger{color:var(--danger);border-color:rgba(192,57,43,0.3)}
.btn-top.danger:hover{background:var(--danger2);border-color:var(--danger)}

/* ════ PANELS ════ */
.panel{display:none}.panel.active{display:block}

/* ════ STATS ════ */
.content{padding:20px 24px 0}
.stats-bar{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.stat-card{background:#fff;border:1px solid var(--gray2);border-radius:var(--radius-sm);padding:10px 16px;box-shadow:var(--shadow);min-width:110px;position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.stat-card.s-orange::before{background:var(--orange)}
.stat-card.s-navy::before{background:var(--navy)}
.stat-card.s-green::before{background:var(--green)}
.stat-label{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:3px}
.stat-value{font-size:20px;font-weight:700;color:var(--navy);font-family:'JetBrains Mono',monospace}

/* ════ FLOATING SCROLLBAR ════ */
.float-scroll-wrap{
  position:fixed;
  bottom:0;
  left:230px;
  right:0;
  z-index:999;
  background:var(--off);
  border-top:1px solid var(--gray2);
  padding:0 24px;
  height:16px;
  display:none;
  align-items:center;
}
.float-scroll-wrap.visible{display:flex}
.float-scroll-track{
  flex:1;
  overflow-x:auto;
  overflow-y:hidden;
  height:16px;
  cursor:pointer;
}
.float-scroll-track::-webkit-scrollbar{height:8px}
.float-scroll-track::-webkit-scrollbar-track{background:var(--gray1);border-radius:4px}
.float-scroll-track::-webkit-scrollbar-thumb{background:var(--gray3);border-radius:4px}
.float-scroll-track::-webkit-scrollbar-thumb:hover{background:var(--navy3)}
.float-scroll-sizer{height:1px;display:block}

/* ════ BOARD ════ */
.board-scroll{overflow-x:auto;overflow-y:visible;padding:0 24px 32px}
.board-scroll::-webkit-scrollbar{display:none}
.board-scroll{-ms-overflow-style:none;scrollbar-width:none}
.board{display:flex;gap:16px;align-items:flex-start;min-width:max-content}

/* ════ PESSOA (coluna) ════ */
.pessoa-col{width:280px;flex-shrink:0;display:flex;flex-direction:column;gap:0}

.pessoa-head{background:var(--dark);border-radius:var(--radius) var(--radius) 0 0;padding:13px 15px;display:flex;align-items:center;justify-content:space-between}
.pessoa-head-info{min-width:0}
.pessoa-name{font-size:13px;font-weight:700;color:#fff}
.pessoa-role{font-size:10px;color:rgba(255,255,255,0.45);margin-top:2px}
.pessoa-head-right{display:flex;align-items:center;gap:5px;flex-shrink:0}
.pessoa-badge{background:rgba(255,255,255,0.12);color:rgba(255,255,255,0.8);font-size:9px;font-weight:700;padding:2px 6px;border-radius:8px;font-family:'JetBrains Mono',monospace;white-space:nowrap}
.pessoa-icon-btn{background:rgba(255,255,255,0.08);border:none;border-radius:5px;color:rgba(255,255,255,0.4);font-size:12px;cursor:pointer;width:22px;height:22px;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;opacity:0}
.pessoa-head:hover .pessoa-icon-btn{opacity:1}
.pessoa-icon-btn:hover{background:rgba(255,255,255,0.18);color:#fff}
.pessoa-icon-btn.del:hover{background:rgba(232,34,39,0.4);color:#fff}
.pessoa-accent{height:3px;background:var(--orange)}

.pessoa-body{background:#fff;border:1px solid var(--gray2);border-top:none;border-radius:0 0 var(--radius) var(--radius);display:flex;flex-direction:column}

/* ── Add função inline ── */
.add-funcao-area{padding:10px 12px;border-top:1px solid var(--gray1)}
.add-funcao-btn{display:flex;align-items:center;gap:6px;width:100%;padding:7px 9px;border-radius:var(--radius-sm);border:1.5px dashed var(--gray2);background:transparent;cursor:pointer;font-size:11px;font-weight:600;color:var(--muted);font-family:'Sora',sans-serif;text-transform:uppercase;letter-spacing:.05em;transition:all .15s}
.add-funcao-btn:hover{border-color:var(--navy3);color:var(--navy);background:var(--gray1)}
.add-funcao-form{display:none;flex-direction:column;gap:6px;margin-top:6px}
.add-funcao-form.open{display:flex}
.add-funcao-form input{border:1px solid var(--gray2);border-radius:6px;padding:7px 10px;font-size:12px;font-family:'Sora',sans-serif;color:var(--text);outline:none;width:100%}
.add-funcao-form input:focus{border-color:var(--navy)}
.mini-actions{display:flex;gap:5px}

/* ════ FUNÇÃO (bloco dentro da pessoa) ════ */
.funcao-block{border-top:1px solid var(--gray1)}
.funcao-block:first-child{border-top:none}

.funcao-head{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;background:var(--gray1);cursor:pointer;user-select:none;transition:background .12s;gap:8px}
.funcao-head:hover{background:var(--gray2)}
.funcao-head-left{display:flex;align-items:center;gap:7px;min-width:0;flex:1}
.funcao-chevron{font-size:10px;color:var(--gray3);transition:transform .2s;flex-shrink:0}
.funcao-chevron.open{transform:rotate(90deg)}
.funcao-name{font-size:11px;font-weight:700;color:var(--navy);text-transform:uppercase;letter-spacing:.06em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.funcao-count{font-size:9px;font-weight:700;background:var(--navy);color:#fff;padding:1px 5px;border-radius:5px;font-family:'JetBrains Mono',monospace;flex-shrink:0}
.funcao-head-right{display:flex;align-items:center;gap:3px;flex-shrink:0;opacity:0;transition:opacity .12s}
.funcao-head:hover .funcao-head-right{opacity:1}
.funcao-btn{background:transparent;border:none;border-radius:4px;cursor:pointer;font-size:11px;color:var(--muted);width:20px;height:20px;display:flex;align-items:center;justify-content:center;transition:all .12s}
.funcao-btn:hover{background:var(--gray2);color:var(--navy)}
.funcao-btn.del:hover{background:var(--danger2);color:var(--danger)}

.funcao-body{display:none;padding:8px 10px;background:#fff;flex-direction:column;gap:6px}
.funcao-body.open{display:flex}

/* ── Atividade ── */
.ativ-item{display:flex;align-items:flex-start;gap:7px;padding:7px 9px;background:var(--off);border:1px solid var(--gray2);border-radius:var(--radius-sm);transition:border-color .12s,box-shadow .12s;position:relative;overflow:hidden}
.ativ-item::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--orange)}
.ativ-item:hover{border-color:var(--navy3);box-shadow:0 1px 6px rgba(15,30,60,0.07)}
.ativ-dot{width:6px;height:6px;border-radius:50%;background:var(--orange);flex-shrink:0;margin-top:5px}
.ativ-text{flex:1;font-size:12px;color:var(--text);line-height:1.45;word-break:break-word}
.ativ-del{opacity:0;font-size:10px;color:var(--danger);cursor:pointer;padding:2px 5px;border-radius:4px;border:none;background:transparent;transition:opacity .12s;flex-shrink:0;line-height:1}
.ativ-item:hover .ativ-del{opacity:1}
.ativ-del:hover{background:var(--danger2)}

/* add atividade inline */
.add-ativ-btn{display:flex;align-items:center;gap:5px;width:100%;padding:5px 9px;border-radius:var(--radius-sm);border:1.5px dashed var(--gray2);background:transparent;cursor:pointer;font-size:10px;color:var(--muted);font-family:'Sora',sans-serif;transition:all .15s;margin-top:2px}
.add-ativ-btn:hover{border-color:var(--navy3);color:var(--navy);background:var(--gray1)}
.add-ativ-form{display:none;flex-direction:column;gap:5px;margin-top:4px}
.add-ativ-form.open{display:flex}
.add-ativ-form input{border:1px solid var(--gray2);border-radius:6px;padding:6px 9px;font-size:11px;font-family:'Sora',sans-serif;color:var(--text);outline:none;width:100%}
.add-ativ-form input:focus{border-color:var(--navy)}

.funcao-empty{font-size:11px;color:var(--gray3);text-align:center;padding:12px 0;line-height:1.6}

/* ── Add Pessoa ── */
.k-add-col{width:260px;flex-shrink:0}
.add-col-btn{width:100%;padding:13px;background:rgba(43,74,122,0.06);border:2px dashed var(--navy3);border-radius:var(--radius);color:var(--navy3);font-size:12px;font-weight:600;cursor:pointer;font-family:'Sora',sans-serif;transition:all .15s;text-align:center}
.add-col-btn:hover{background:rgba(43,74,122,0.1);border-color:var(--navy)}
.add-col-form{background:#fff;border:1px solid var(--gray2);border-radius:var(--radius);padding:14px;display:none;flex-direction:column;gap:8px;box-shadow:var(--shadow)}
.add-col-form.open{display:flex}
.add-col-form input{border:1px solid var(--gray2);border-radius:6px;padding:8px 10px;font-size:12px;font-family:'Sora',sans-serif;color:var(--text);outline:none;width:100%}
.add-col-form input:focus{border-color:var(--navy)}
.lbl{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:4px}

/* ════ MODAL ════ */
.modal-overlay{position:fixed;inset:0;background:rgba(10,20,45,0.45);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:var(--radius);padding:24px;width:100%;max-width:440px;box-shadow:var(--shadow-md);animation:fadeIn .18s}
.modal-title{font-size:15px;font-weight:700;color:var(--navy);margin-bottom:18px;padding-bottom:10px;border-bottom:1px solid var(--gray2)}
.modal-field{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.modal-field label{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.modal-field input,.modal-field textarea{border:1px solid var(--gray2);border-radius:var(--radius-sm);padding:8px 11px;font-size:13px;font-family:'Sora',sans-serif;color:var(--text);outline:none;width:100%;resize:none}
.modal-field input:focus,.modal-field textarea:focus{border-color:var(--navy);box-shadow:0 0 0 3px rgba(43,74,122,0.1)}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;padding-top:14px;border-top:1px solid var(--gray2)}
.btn-modal{height:36px;padding:0 18px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Sora',sans-serif;border:none;transition:all .15s}
.btn-modal.ok{background:var(--navy);color:#fff}
.btn-modal.ok:hover{background:var(--navy3)}
.btn-modal.cancel{background:var(--gray1);color:var(--muted)}
.btn-modal.cancel:hover{background:var(--gray2)}
.btn-modal.sm{height:28px;padding:0 11px;font-size:11px;border-radius:6px}

/* ════ PÁGINAS ════ */
.page-inner{padding:24px}
.page-inner-title{font-size:15px;font-weight:700;color:var(--navy);margin-bottom:20px}

/* ════ LIXEIRA ════ */
.trash-section-title{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin:20px 0 10px;display:flex;align-items:center;gap:8px}
.trash-section-title::after{content:'';flex:1;height:1px;background:var(--gray2)}
.trash-empty{font-size:13px;color:var(--gray3);text-align:center;padding:48px 0;line-height:2}
.trash-toolbar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.trash-toolbar-label{font-size:12px;color:var(--muted);flex:1}
.trash-item{background:#fff;border:1px solid var(--gray2);border-radius:var(--radius-sm);padding:11px 15px;display:flex;align-items:center;gap:12px;margin-bottom:8px;box-shadow:var(--shadow);transition:border-color .15s}
.trash-item:hover{border-color:var(--navy3)}
.trash-item-icon{font-size:18px;flex-shrink:0;width:28px;text-align:center}
.trash-item-info{flex:1;min-width:0}
.trash-item-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:2px;word-break:break-word}
.trash-item-meta{font-size:11px;color:var(--muted)}
.trash-item-actions{display:flex;gap:6px;flex-shrink:0}
.trash-btn{height:28px;padding:0 11px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;font-family:'Sora',sans-serif;border:none;transition:all .15s;white-space:nowrap}
.trash-btn.restore{background:var(--green2);color:var(--green)}
.trash-btn.restore:hover{opacity:.8}
.trash-btn.del-perm{background:var(--danger2);color:var(--danger)}
.trash-btn.del-perm:hover{opacity:.8}

/* ════ EXPORT ════ */
pre#export-content{font-size:11px;line-height:1.8;color:var(--text);background:var(--gray1);border-radius:var(--radius-sm);padding:14px;overflow-y:auto;max-height:380px;font-family:'JetBrains Mono',monospace;white-space:pre-wrap;word-break:break-word}

/* ════ EDIÇÃO INLINE ════ */
.edit-inline{display:none;align-items:center;gap:4px;width:100%}
.edit-inline.open{display:flex}
.edit-inline input{font-family:'Sora',sans-serif;font-size:inherit;font-weight:inherit;color:inherit;background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.35);border-radius:5px;padding:3px 7px;outline:none;flex:1;min-width:0}
.edit-inline input:focus{border-color:rgba(255,255,255,0.7);background:rgba(255,255,255,0.22)}
.edit-inline.dark input{background:rgba(255,255,255,0.12);border-color:rgba(255,255,255,0.3);color:#fff}
.edit-inline.light input{background:#fff;border:1px solid var(--navy3);color:var(--navy);font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;border-radius:5px;padding:2px 7px}
.edit-inline.ativ input{background:#fff;border:1px solid var(--navy3);color:var(--text);font-size:12px;font-weight:400;border-radius:5px;padding:3px 7px;flex:1}
.edit-ok{background:var(--green);color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:11px;padding:3px 7px;font-weight:600;font-family:'Sora',sans-serif;white-space:nowrap;flex-shrink:0}
.edit-ok:hover{opacity:.85}
.edit-cancel{background:transparent;border:none;border-radius:4px;cursor:pointer;font-size:12px;color:rgba(255,255,255,0.5);padding:3px 5px;flex-shrink:0}
.edit-cancel.light{color:var(--muted)}
.edit-cancel:hover{color:#fff}
.edit-cancel.light:hover{color:var(--danger)}

/* botão de lápis — Pessoa */
.pessoa-edit-btn{background:rgba(255,255,255,0.08);border:none;border-radius:5px;color:rgba(255,255,255,0.4);font-size:11px;cursor:pointer;width:22px;height:22px;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;opacity:0}
.pessoa-head:hover .pessoa-edit-btn{opacity:1}
.pessoa-edit-btn:hover{background:rgba(255,255,255,0.18);color:#fff}

/* botão de lápis — Função */
.funcao-edit-btn{background:transparent;border:none;border-radius:4px;cursor:pointer;font-size:11px;color:var(--muted);width:20px;height:20px;display:flex;align-items:center;justify-content:center;transition:all .12s}
.funcao-edit-btn:hover{background:var(--gray2);color:var(--navy)}

/* botão de lápis — Atividade */
.ativ-edit-btn{opacity:0;font-size:10px;color:var(--muted);cursor:pointer;padding:2px 5px;border-radius:4px;border:none;background:transparent;transition:opacity .12s;flex-shrink:0;line-height:1}
.ativ-item:hover .ativ-edit-btn{opacity:1}
.ativ-edit-btn:hover{background:var(--gray1);color:var(--navy)}

@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
</style>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-text">GPC<span>.</span></div>
    <div class="sidebar-tag">Gestão de Atividades</div>
  </div>
  <div class="sidebar-section">Quadros</div>
  <div class="nav-item active" id="nav-board" onclick="showView('board')">
    <span class="nav-icon">📋</span> Divisão de Tarefas
  </div>
  <div class="nav-item" id="nav-trash" onclick="showView('trash')">
    <span class="nav-icon">🗑️</span> Lixeira
    <span class="nav-badge" id="trash-badge" style="display:none">0</span>
  </div>
  <div class="sidebar-section">Ferramentas</div>
  <div class="nav-item" onclick="openExportModal()">
    <span class="nav-icon">📤</span> Exportar
  </div>
  <div class="sidebar-spacer"></div>
  <div class="sidebar-footer">
    Grupo Pinto Cerqueira<br>
    <span style="color:rgba(255,255,255,0.4)">Gestão Interna · R2 Soluções</span>
  </div>
</div>

<!-- MAIN -->
<div class="main">
  <div class="topbar">
    <div class="topbar-title">
      <span class="dot-live"></span>
      <span id="topbar-title-text">Divisão de Atividades</span>
    </div>
    <div class="topbar-right" id="topbar-actions">
      <span id="conn-status"></span>
      <button class="btn-top" onclick="openAddPessoaModal()">+ Pessoa</button>
      <button class="btn-top orange" onclick="openExportModal()">📤 Exportar</button>
    </div>
  </div>

  <!-- PANEL: BOARD -->
  <div class="panel active" id="panel-board">
    <div class="content">
      <div class="stats-bar">

<script>
// ════════════════════════════════════════
// FIREBASE — carregamento dinâmico
// Funciona tanto em file:// quanto em servidor
// ════════════════════════════════════════
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyCC1eN7UpKjiWzama7jmjxlLiwP4vb2p6o",
  authDomain: "gpc---atividades.firebaseapp.com",
  databaseURL: "https://gpc---atividades-default-rtdb.firebaseio.com",
  projectId: "gpc---atividades",
  storageBucket: "gpc---atividades.firebasestorage.app",
  messagingSenderId: "1052592422530",
  appId: "1:1052592422530:web:57b58c29e15eefd65d3e9b"
};

const SK_LOCAL  = 'gpc_hier_v1';
const SK_TRASH  = 'gpc_hier_trash_v1';
const lsGet = k => { try{ const r=localStorage.getItem(k); return r?JSON.parse(r):null; }catch(e){ return null; } };
const lsSet = (k,v) => { try{ localStorage.setItem(k,JSON.stringify(v)); }catch(e){} };

let db = null;   // Firebase database instance (null = offline mode)
let _fbReady = false;

function setStatus(state){
  const el=document.getElementById('conn-status');
  if(!el) return;
  const map={
    connecting: ['🟡','Conectando...','#D4960A'],
    online:     ['🟢','Sincronizado','#1E7B4B'],
    offline:    ['🔴','Local — sem sincronização','#C0392B']
  };
  const [icon,text,color]=map[state]||map.offline;
  el.innerHTML=`<span style="color:${color};font-size:10px;display:flex;align-items:center;gap:4px">${icon} ${text}</span>`;
}

function save(){
  if(db){
    db.ref('pessoas').set(pessoas);
    db.ref('trash').set(trash);
  } else {
    lsSet(SK_LOCAL, pessoas);
    lsSet(SK_TRASH, trash);
  }
}

function initOffline(){
  pessoas = lsGet(SK_LOCAL) || JSON.parse(JSON.stringify(DEF_PESSOAS));
  trash   = lsGet(SK_TRASH) || [];
  pessoas.forEach(p=>{ if(!p.funcoes) p.funcoes=[]; p.funcoes.forEach(f=>{ if(!f.atividades) f.atividades=[]; }); });
  // merge defaults com funções pré-cadastradas
  DEF_PESSOAS.forEach(def => {
    if(!def.funcoes || !def.funcoes.length) return;
    const ex = pessoas.find(p => p.id === def.id);
    if(ex && (!ex.funcoes || !ex.funcoes.length)){
      ex.funcoes = JSON.parse(JSON.stringify(def.funcoes));
    }
  });
  _fbReady = true;
  setStatus('offline');
  render();
  syncBadge();
}

function initFirebase(){
  setStatus('connecting');
  db.ref('pessoas').on('value', snap => {
    const val = snap.val();
    if(val && Array.isArray(val) && val.length > 0){
      pessoas = val;
      // merge: insere funções pré-cadastradas se a pessoa ainda não tiver
      let changed = false;
      DEF_PESSOAS.forEach(def => {
        if(!def.funcoes || !def.funcoes.length) return;
        const ex = pessoas.find(p => p.id === def.id);
        if(ex && (!ex.funcoes || !ex.funcoes.length)){
          ex.funcoes = JSON.parse(JSON.stringify(def.funcoes));
          changed = true;
        }
      });
      if(changed) db.ref('pessoas').set(pessoas);
    } else if(!_fbReady){
      pessoas = JSON.parse(JSON.stringify(DEF_PESSOAS));
      db.ref('pessoas').set(pessoas);
    }
    pessoas.forEach(p=>{ if(!p.funcoes) p.funcoes=[]; p.funcoes.forEach(f=>{ if(!f.atividades) f.atividades=[]; }); });
    _fbReady = true;
    setStatus('online');
    render();
    syncBadge();
  }, () => { if(!_fbReady) initOffline(); });

  db.ref('trash').on('value', snap => {
    const val = snap.val();
    trash = val && Array.isArray(val) ? val : [];
    syncBadge();
  });
}

// Carrega Firebase dinamicamente — funciona em servidor/GitHub Pages
// Em file:// o script externo pode ser bloqueado, caindo no fallback offline
function loadFirebase(){
  const loaded = {app: false, db: false};
  function tryInit(){
    if(!loaded.app || !loaded.db) return;
    try{
      firebase.initializeApp(FIREBASE_CONFIG);
      db = firebase.database();
      initFirebase();
    } catch(e){
      initOffline();
    }
  }

  function loadScript(url, key){
    const s = document.createElement('script');
    s.src = url;
    s.onload  = () => { loaded[key]=true; tryInit(); };
    s.onerror = () => { initOffline(); };
    document.head.appendChild(s);
  }

  loadScript('https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js',      'app');
  loadScript('https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js', 'db');
}

// Detecta se está em file:// — nesse caso vai direto para offline
// Para sincronizar, o arquivo precisa estar hospedado (GitHub Pages, etc.)
if(location.protocol === 'file:'){
  document.addEventListener('DOMContentLoaded', initOffline);
} else {
  document.addEventListener('DOMContentLoaded', loadFirebase);
}
</script>

        <button class="edit-ok" style="font-size:10px;padding:2px 6px" onclick="confirmEditAtiv('${pessoaId}','${f.id}','${a.id}')">✓</button>
        <button class="edit-cancel light" onclick="cancelEditAtiv('${a.id}')">✕</button>
      </div>
      <button class="ativ-edit-btn" onclick="startEditAtiv('${a.id}')" title="Editar">✏️</button>
      <button class="ativ-del" onclick="trashAtiv('${pessoaId}','${f.id}','${a.id}')" title="Lixeira">🗑</button>
    </div>`).join('');

  return `
    <div class="funcao-block" id="fb-${f.id}">
      <div class="funcao-head" onclick="toggleFuncao('${f.id}')">
        <div class="funcao-head-left">
          <span class="funcao-chevron open" id="fchev-${f.id}">▶</span>
          <span class="funcao-name" id="fname-${f.id}">${esc(f.name)}</span>
          <div class="edit-inline light" id="fedit-${f.id}" onclick="event.stopPropagation()">
            <input id="fedit-inp-${f.id}" value="${esc(f.name)}" />
            <button class="edit-ok" style="font-size:10px;padding:2px 6px" onclick="confirmEditFuncao('${pessoaId}','${f.id}')">✓</button>
            <button class="edit-cancel light" onclick="cancelEditFuncao('${f.id}')">✕</button>
          </div>
          <span class="funcao-count">${f.atividades.length}</span>
        </div>
        <div class="funcao-head-right" onclick="event.stopPropagation()">
          <button class="funcao-edit-btn" onclick="startEditFuncao('${f.id}')" title="Editar">✏️</button>
          <button class="funcao-btn del" onclick="trashFuncao('${pessoaId}','${f.id}')" title="Lixeira">🗑</button>
        </div>
      </div>
      <div class="funcao-body open" id="fbody-${f.id}">
        ${f.atividades.length===0
          ? `<div class="funcao-empty">Nenhuma atividade.<br>Adicione abaixo.</div>`
          : atvHtml}
        <button class="add-ativ-btn" id="aa-btn-${f.id}" onclick="toggleAtivForm('${f.id}')">
          <span style="font-size:13px;line-height:1">+</span> Adicionar atividade
        </button>
        <div class="add-ativ-form" id="aa-form-${f.id}">
          <input id="aa-inp-${f.id}" placeholder="Descreva a atividade..." />
          <div class="mini-actions">
            <button class="btn-modal ok sm" onclick="confirmAddAtiv('${pessoaId}','${f.id}')">Adicionar</button>
            <button class="btn-modal cancel sm" onclick="toggleAtivForm('${f.id}')">Cancelar</button>
          </div>
        </div>
      </div>
    </div>`;
}

function toggleAtivForm(fid){
  const form=document.getElementById('aa-form-'+fid);
  const btn=document.getElementById('aa-btn-'+fid);
  // garante que a funcao-body está aberta
  const body=document.getElementById('fbody-'+fid);

function toggleAddCol(){

// CRUD — PESSOAS
// ════════════════════════════════════════
function openAddPessoaModal(){ openModal('modal-pessoa'); document.getElementById('mp-name').focus(); }
function confirmAddPessoa(){
  const name=document.getElementById('mp-name').value.trim(); if(!name) return;
  pessoas.push({id:'p'+uid(), name, role:document.getElementById('mp-role').value.trim(), funcoes:[]});
  document.getElementById('mp-name').value=''; document.getElementById('mp-role').value='';
  closeModal('modal-pessoa'); save(); render();
}
function confirmAddCol(){
  const name=document.getElementById('nc-name').value.trim(); if(!name) return;
  pessoas.push({id:'p'+uid(), name, role:document.getElementById('nc-role').value.trim(), funcoes:[]});
  document.getElementById('nc-name').value=''; document.getElementById('nc-role').value='';
  document.getElementById('add-col-form').classList.remove('open');
  document.getElementById('add-col-btn').style.display='block';
  save(); render();
}
function trashPessoa(pid){
  const p=pessoas.find(x=>x.id===pid); if(!p) return;
  trash.push({id:'t'+uid(), type:'pessoa', data:JSON.parse(JSON.stringify(p)),
    meta:p.name+(p.role?' · '+p.role:''), deletedAt:Date.now()});
  pessoas=pessoas.filter(x=>x.id!==pid);
  save(); render();
}

// ════════════════════════════════════════
// CRUD — FUNÇÕES
// ════════════════════════════════════════
function confirmAddFuncao(pid){
  const inp=document.getElementById('af-inp-'+pid);
  const name=inp.value.trim(); if(!name) return;
  const p=pessoas.find(x=>x.id===pid); if(!p) return;
  p.funcoes.push({id:'f'+uid(), name, atividades:[]});
  inp.value='';
  save(); render();
  // reabrir o form após render para permitir adicionar várias funções seguidas
  const form=document.getElementById('af-form-'+pid);
  const btn=document.getElementById('af-btn-'+pid);
  if(form){ form.classList.add('open'); btn.style.display='none'; setTimeout(()=>document.getElementById('af-inp-'+pid)?.focus(),50); }
}
function trashFuncao(pid, fid){
  const p=pessoas.find(x=>x.id===pid); if(!p) return;
  const f=p.funcoes.find(x=>x.id===fid); if(!f) return;
  trash.push({id:'t'+uid(), type:'funcao', data:JSON.parse(JSON.stringify(f)),
    meta:`${f.name} (função de ${p.name})`, parentId:pid, deletedAt:Date.now()});
  p.funcoes=p.funcoes.filter(x=>x.id!==fid);
  save(); render();
}

// CRUD — ATIVIDADES
// ════════════════════════════════════════
function confirmAddAtiv(pid, fid){
  const inp=document.getElementById('aa-inp-'+fid);
  const text=inp.value.trim(); if(!text) return;
  const p=pessoas.find(x=>x.id===pid); if(!p) return;
  const f=p.funcoes.find(x=>x.id===fid); if(!f) return;
  f.atividades.push({id:'a'+uid(), text});
  inp.value='';
  save(); render();
  // manter form aberto para adicionar várias atividades seguidas
  const form=document.getElementById('aa-form-'+fid);
  const btn=document.getElementById('aa-btn-'+fid);
  const body=document.getElementById('fbody-'+fid);
  if(form){ form.classList.add('open'); btn.style.display='none'; body?.classList.add('open'); document.getElementById('fchev-'+fid)?.classList.add('open'); setTimeout(()=>document.getElementById('aa-inp-'+fid)?.focus(),50); }
}
function trashAtiv(pid, fid, aid){
  const p=pessoas.find(x=>x.id===pid); if(!p) return;
  const f=p.funcoes.find(x=>x.id===fid); if(!f) return;
  const a=f.atividades.find(x=>x.id===aid); if(!a) return;
  trash.push({id:'t'+uid(), type:'atividade', data:JSON.parse(JSON.stringify(a)),
    meta:`${a.text} · ${f.name} / ${p.name}`, parentPid:pid, parentFid:fid, deletedAt:Date.now()});
  f.atividades=f.atividades.filter(x=>x.id!==aid);
  save(); render();
}

// ════════════════════════════════════════
// LIXEIRA
// ════════════════════════════════════════
function renderTrash(){
  const box=document.getElementById('trash-content');
  const lbl=document.getElementById('trash-count-label');
  const btn=document.getElementById('btn-empty-trash');
  if(!trash.length){
    box.innerHTML=`<div class="trash-empty">🗑️<br><br>A lixeira está vazia.<br><span style="font-size:11px;color:var(--gray3)">Itens excluídos aparecem aqui.</span></div>`;
    lbl.textContent=''; btn.style.display='none'; return;
  }
  lbl.textContent=`${trash.length} ${trash.length===1?'item':'itens'} na lixeira`;
  btn.style.display='flex';
  const icons={pessoa:'👤',funcao:'⚙️',atividade:'📌'};
  const labels={pessoa:'Pessoas',funcao:'Funções',atividade:'Atividades'};
  const byType={pessoa:[],funcao:[],atividade:[]};
  trash.forEach(t=>{ if(byType[t.type]) byType[t.type].push(t); });
  let html='';
  ['pessoa','funcao','atividade'].forEach(type=>{
    const items=byType[type]; if(!items.length) return;
    html+=`<div class="trash-section-title">${labels[type]}</div>`;
    [...items].reverse().forEach(item=>{
      html+=`
        <div class="trash-item">
          <div class="trash-item-icon">${icons[type]}</div>
          <div class="trash-item-info">
            <div class="trash-item-title">${esc(item.meta)}</div>
            <div class="trash-item-meta">Excluído em ${fmtTs(item.deletedAt)}</div>
          </div>
          <div class="trash-item-actions">
            <button class="trash-btn restore" onclick="restoreItem('${item.id}')">↩ Restaurar</button>
            <button class="trash-btn del-perm" onclick="permDelete('${item.id}')">✕ Excluir</button>
          </div>
        </div>`;
    });
  });
  box.innerHTML=html;
}

function restoreItem(tid){
  const i=trash.findIndex(t=>t.id===tid); if(i===-1) return;
  const item=trash[i];
  if(item.type==='pessoa'){
    if(!pessoas.find(p=>p.id===item.data.id)) pessoas.push(item.data);
    else { item.data.id='p'+uid(); pessoas.push(item.data); }
  } else if(item.type==='funcao'){
    const p=pessoas.find(x=>x.id===item.parentId);
    if(p){ if(!p.funcoes.find(f=>f.id===item.data.id)) p.funcoes.push(item.data); }
    else {
      let rec=pessoas.find(x=>x.id==='recovery');
      if(!rec){ rec={id:'recovery',name:'Recuperados',role:'',funcoes:[]}; pessoas.push(rec); }
      rec.funcoes.push(item.data);
    }
  } else if(item.type==='atividade'){
    const p=pessoas.find(x=>x.id===item.parentPid);
    if(p){
      const f=p.funcoes.find(x=>x.id===item.parentFid);
      if(f){ if(!f.atividades.find(a=>a.id===item.data.id)) f.atividades.push(item.data); }
      else {
        // a função foi excluída — recria com nome "Recuperados"
        let rec=p.funcoes.find(x=>x.id==='frec');
        if(!rec){ rec={id:'frec',name:'Recuperados',atividades:[]}; p.funcoes.push(rec); }
        rec.atividades.push(item.data);
      }
    }
  }
  trash.splice(i,1);
  save(); render(); renderTrash(); syncBadge();
}
function permDelete(tid){ trash=trash.filter(t=>t.id!==tid); save(); renderTrash(); syncBadge(); }
function emptyTrash(){
  if(!confirm('Esvaziar toda a lixeira? Não pode ser desfeito.')) return;
  trash=[]; save(); renderTrash(); syncBadge();
}

function openExportModal(){
  const lines=pessoas.map(p=>{
    const h=p.role?`${p.name} (${p.role})`:p.name;
    if(!p.funcoes.length) return `${h}:\n  (sem funções)`;
    const fs=p.funcoes.map(f=>{
      const as=f.atividades.length
        ? f.atividades.map(a=>`      • ${a.text}`).join('\n')
        : '      (sem atividades)';
      return `  ▸ ${f.name}\n${as}`;
    }).join('\n');
    return `${h}:\n${fs}`;
  }).join('\n\n');
  document.getElementById('export-content').textContent=lines||'(nenhuma pessoa cadastrada)';
  openModal('modal-export');
}
function copyExport(){
  navigator.clipboard.writeText(document.getElementById('export-content').textContent).catch(()=>{});
  const b=event.target; b.textContent='Copiado!'; setTimeout(()=>b.textContent='Copiar texto',1600);
}

// KEYBOARD SHORTCUTS
// ════════════════════════════════════════
document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('mp-name').addEventListener('keydown',e=>{ if(e.key==='Enter') document.getElementById('mp-role').focus(); });
  document.getElementById('mp-role').addEventListener('keydown',e=>{ if(e.key==='Enter') confirmAddPessoa(); });
  document.getElementById('nc-name').addEventListener('keydown',e=>{ if(e.key==='Enter') document.getElementById('nc-role').focus(); });
  document.getElementById('nc-role').addEventListener('keydown',e=>{ if(e.key==='Enter') confirmAddCol(); });
  document.getElementById('board').addEventListener('keydown', e=>{
    const id=e.target.id||'';
    if(e.key==='Enter'){
      if(id.startsWith('af-inp-'))  confirmAddFuncao(id.replace('af-inp-',''));
      if(id.startsWith('aa-inp-')){ const fid=id.replace('aa-inp-',''); const pid=e.target.dataset.pid||''; if(pid) confirmAddAtiv(pid,fid); }
      if(id.startsWith('pedit-name-')){ confirmEditPessoa(id.replace('pedit-name-','')); }
      if(id.startsWith('pedit-role-')){ confirmEditPessoa(id.replace('pedit-role-','')); }
      if(id.startsWith('fedit-inp-')){ const fid=id.replace('fedit-inp-',''); let pid=''; pessoas.forEach(p=>p.funcoes.forEach(f=>{ if(f.id===fid) pid=p.id; })); if(pid) confirmEditFuncao(pid,fid); }
      if(id.startsWith('aedit-inp-')){ const aid=id.replace('aedit-inp-',''); let pid='',fid=''; pessoas.forEach(p=>p.funcoes.forEach(f=>f.atividades.forEach(a=>{ if(a.id===aid){pid=p.id;fid=f.id;} }))); if(pid) confirmEditAtiv(pid,fid,aid); }
    }
    if(e.key==='Escape'){
      if(id.startsWith('pedit-name-')||id.startsWith('pedit-role-')) cancelEditPessoa(id.replace('pedit-name-','').replace('pedit-role-',''));
      if(id.startsWith('fedit-inp-')) cancelEditFuncao(id.replace('fedit-inp-',''));
      if(id.startsWith('aedit-inp-')) cancelEditAtiv(id.replace('aedit-inp-',''));
    }
  });
});

// ════════════════════════════════════════
// BARRA DE ROLAGEM FLUTUANTE (rodapé fixo)
// ════════════════════════════════════════
function initFloatScroll(){
  const boardScroll = document.getElementById('board-scroll');
  const track       = document.getElementById('float-scroll-track');
  const sizer       = document.getElementById('float-scroll-sizer');
  const wrap        = document.getElementById('float-scroll-wrap');
  if(!boardScroll||!track||!sizer||!wrap) return;

  let syncing = false;

  function update(){
    const sw = boardScroll.scrollWidth;
    const cw = boardScroll.clientWidth;
    sizer.style.width = sw + 'px';
    wrap.classList.toggle('visible', sw > cw + 2);
  }

  // barra flutuante → board
  track.addEventListener('scroll', ()=>{
    if(syncing) return;
    syncing = true;
    boardScroll.scrollLeft = track.scrollLeft;
    requestAnimationFrame(()=>{ syncing = false; });
  });

  // board → barra flutuante
  boardScroll.addEventListener('scroll', ()=>{
    if(syncing) return;
    syncing = true;
    track.scrollLeft = boardScroll.scrollLeft;
    requestAnimationFrame(()=>{ syncing = false; });
  });

  update();
  window.addEventListener('resize', update);
  // re-sincroniza quando o board mudar de tamanho (novas colunas)
  new ResizeObserver(update).observe(boardScroll);
}

document.addEventListener('DOMContentLoaded', initFloatScroll);
